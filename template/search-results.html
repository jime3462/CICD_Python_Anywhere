<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaveRoom | Search Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="noise"></div>
  <header class="topbar">
    <a class="brand" href="/">WaveRoom</a>
    <div class="topbar-right">
      <nav>
        <a href="/ui/songs">Add Song</a>
        <a href="/ui/artists">Artists</a>
      </nav>
      <form class="topbar-search" action="/ui/search-results" method="get">
        <label for="resultsKeyword" class="sr-only">Search songs</label>
        <input id="resultsKeyword" name="keyword" type="text" placeholder="Search songs..." required>
        <button class="btn primary" type="submit">Search</button>
      </form>
    </div>
  </header>

  <main class="page">
    <h2>Search Results</h2>
    <section class="panel">
      <p class="note" id="searchSummary">Searching...</p>
      <div class="result" id="searchPageResult">No data yet.</div>
    </section>
  </main>

  <script src="/assets/app-ui.js"></script>
</body>
</html>
