name: Deploy to PythonAnywhere

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Trigger PythonAnywhere gitpull webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          echo "Triggering gitpull webhook on PythonAnywhere..."
          payload='{}'
          signature=$(python3 -c "import os,hmac,hashlib; print(hmac.new(os.environ['WEBHOOK_SECRET'].encode('utf-8'), b'{}', hashlib.sha256).hexdigest())")

          status_code=$(curl -sS -o /tmp/gitpull_response.txt -w "%{http_code}" -X POST https://jime3462.pythonanywhere.com/gitpull \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${signature}" \
            -d "${payload}")

          echo "gitpull webhook HTTP status: ${status_code}"
          if [ "${status_code}" = "404" ]; then
            echo "Warning: /gitpull route not found on deployed app."
            echo "Run a one-time manual git pull + web app reload on PythonAnywhere to bootstrap deployment."
            cat /tmp/gitpull_response.txt
            exit 0
          fi

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Error: gitpull webhook call failed."
            cat /tmp/gitpull_response.txt
            exit 1
          fi

      - name: Wait a few seconds for git pull to finish
        run: sleep 30

      - name: Reload PythonAnywhere web app
        run: |
          echo "Reloading PythonAnywhere web app..."
          curl --fail -sS -X POST "https://www.pythonanywhere.com/api/v0/user/jime3462/webapps/jime3462.pythonanywhere.com/reload/" \
            -H "Authorization: Token ${{ secrets.PYTHONANYWHERE_API_TOKEN }}"